<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <title>Sorozatok</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background-color: rgb(100, 100, 100);
      color: white;
      font-family: Calibri, sans-serif;
    }
    h1 {
      text-align: center;
      font-size: clamp(2.5rem, 8vw, 6rem);
    }
    .series-content {
      max-width: 1400px;
      margin: 3rem auto 0 auto;
      text-align: center;
    }
    .series-content h2 {
      font-size: 5rem;
    }
    .card-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 2rem;
    }
    .game-card {
      width: 300px;
      max-width: 70vw;
      min-width: 0;
      flex-shrink: 0;
    }
    @media (max-width: 700px) {
      .card-grind {
        flex-wrap: wrap;
      }
      .game-card {
        width: 130px;
      }
    }
    .game-image {
      width: 100%;
      height: auto;
      aspect-ratio: 150 / 267;
      background-color: rgb(160, 160, 160);
      object-fit: cover;
    }
    .game-card p {
      text-align: center;
      font-size: 2.4rem;
      margin-top: 0.5rem;
    }
    @media (max-width: 600px) {
      .game-card {
        width: 130px;
      }
      .game-image {
        width: 130px;
        height: 231px;
      }
      .game-card p {
        font-size: 1rem;
      }
      .card-grind {
        gap: 1rem;
      }
    }
 </style>
</head>
<body>
  <h1>FLG</h1>
  <div class="row">
    <div class="column left">
      <div class="left-content">
        <div class="series-content">
          <h2>Sorozataink</h2>
          <div class="card-grid">
            <div class="game-card">
              <img src="images/ark.png" class="game-image">
              <p>ARK: Survival Evolved</p>
            </div>
            <div class="game-card">
              <img src="images/BET.png" class="game-image">
              <p>Backrooms: Escape Together</p>
            </div>
            <div class="game-card">
              <img src="images/bloodytrapland.png" class="game-image">
              <p>Bloody Trapland</p>
            </div>
            <div class="game-card">
              <img src="images/chainedtogether.png" class="game-image">
              <p>Chained Together</p>
            </div>
            <div class="game-card">
              <img src="images/cs2.png" class="game-image">
              <p>Counter-Strike 2</p>
            </div>
            <div class="game-card">
              <img src="images/minecraft.png" class="game-image">
              <p>Minecraft</p>
            </div>
            <div class="game-card">
              <img src="images/terraria.png" class="game-image">
              <p>Terraria</p>
            </div>
            <div class="game-card">
              <img src="images/fallguys.png" class="game-image">
              <p>Fall guys</p>
            </div>
            <div class="game-card">
              <img src="images/fortnite.png" class="game-image">
              <p>Fortnite</p>
            </div>
            <div class="game-card">
              <img src="images/ghostbane.png" class="game-image">
              <p>Ghostbane</p>
            </div>
            <div class="game-card">
              <img src="images/gtaonline.png" class="game-image">
              <p>GTA V: Online</p>
            </div>
          </div>
          </div>
          </div>
          </div>
          </div>
          </div>
          </div>
        </div>
      </div>
  </div>
    <div class="column right">
    </div>
  </div>
</body>
</html>
