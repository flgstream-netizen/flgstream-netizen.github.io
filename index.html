<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <title>Sorozatok</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background-color: rgb(220, 220, 220);
    }
    h1 {
      text-align: center;
      font-size: 6rem;
    }
    
    .row {
      display: flex;
    }
    
    .column {
      width: 50%;
    }
    .column.right{
      text-align: right;
    }
    .right h2 {
      display: inline-block;
      text-align: center;
      margin-right: 15vw;
      margin-top: 3rem;
      font-size: 3rem;
    }
    .left-content {
      width: 672px;
      margin-left: 12vw;
      margin-top: 3rem;
    }
    .left-content h2 {
      text-align: center;
      font-size: 3rem;
      margin: 0 0 2rem 0;
    }
    .card-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
    }
    .game-card {
      width: 150px;
    }
    .game-image {
      width: 150px;
      height: 267px;
      background-color: rgb(160, 160, 160);
    }
    .game-card p {
      text-align: center;
      font-size: 1.2rem;
      margin-top: 0.5rem;
    }
 </style>
</head>
<body>
  <h1>Sorozataink</h1>
  <div class="row">
    <div class="column left">
      <div class="left-content">
        <h2>Jelenlegi sorozataink</h2>
        <div class="card-grid">
          <div class="game-card">
            <div class="game-image"></div>
            <p>ARK: Survival Evolved</p>
          </div>
          <div class="game-card">
            <div class="game-image"></div>
            <p>ARK: Survival Evolved 2</p>
          </div>
          <div class="game-card">
            <div class="game-image"></div>
            <p>ARK: Survival Evolved 3</p>
          </div>
          <div class="game-card">
            <div class="game-image"></div>
            <p>ARK: Survival Evolved 4</p>
          </div>
        </div>
      </div>
    </div>
    <div class="column right">
      <h2>Hamarosan<br>érkező sorozatok</h2>
    </div>
  </div>
</body>
</html>
